name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contract typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck contracts
        run: npm run typecheck:contracts

      - name: Check Local Replica schema
        run: SCHEMA_MODE=mvp-clean npm run check:schema

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      RECALL_PROPERTY_DB_CONFIGURED: ${{ secrets.SUPABASE_DB_URL != '' && 'true' || 'false' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Recall property diagnostic
        if: ${{ env.RECALL_PROPERTY_DB_CONFIGURED == 'true' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run test:recall:integration

      - name: Skip Recall property diagnostic
        if: ${{ env.RECALL_PROPERTY_DB_CONFIGURED != 'true' }}
        run: echo "Skipping Recall property diagnostic because SUPABASE_DB_URL is not configured for this repository."

      - name: Run tests
        run: npm test

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - contracts
      - backend
      - frontend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy application
        run: |
          echo "Starting deployment to production..."
          echo "CI checks passed on main."
          echo "Replace this command with your hosting provider CLI deploy command."
