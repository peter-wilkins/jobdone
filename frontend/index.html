<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link id="jobdone-manifest" rel="manifest" href="/manifest.webmanifest?v=%VITE_BUILD_ID%" type="application/manifest+json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="jobdone-build" content="%VITE_BUILD_ID%" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="JobDone" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <title>JobDone</title>
    <script>
      (() => {
        const host = window.location.hostname.toLowerCase();
        const manifest = document.getElementById('jobdone-manifest');
        const staging = host.includes('staging');
        const production = host.includes('production') ||
          host === 'frontend-six-sage-63.vercel.app' ||
          host === 'frontend-peter-wilkins-jobdone1.vercel.app';
        if (staging) {
          manifest.href = '/manifest-staging.webmanifest?v=%VITE_BUILD_ID%';
          document.title = 'JobDone Staging';
        } else if (production) {
          manifest.href = '/manifest-production.webmanifest?v=%VITE_BUILD_ID%';
          document.title = 'JobDone Production';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
